stages:
  - test
  - build
  - deploy

lint:
  image: artifacts.innogames.de:5000/golangci/golangci-lint:latest
  stage: test
  script:
    - make lint
  tags:
    - docker

test:
  image: artifacts.innogames.de:5000/golang:latest
  stage: test
  script:
    - go test -race -count=1 ./...
  tags:
    - docker

build:
  image: artifacts.innogames.de:5000/golang:latest
  stage: build
  script:
    - apt-get update && apt-get install -y --no-install-recommends dpkg-dev
    - make deb VERSION=0.1.0.$CI_JOB_ID
  artifacts:
    paths:
      - pgdu
      - pgdu_*.deb
    expire_in: 1 week
  tags:
    - docker

deploy:
  image: artifacts.innogames.de:5000/golang:latest
  stage: deploy
  when: manual
  needs:
    - build
  script:
    - 'curl "$DEB_DROP_URL" -F "token=$DEB_DROP_TOKEN" -F "repos=innogames-stable-amd64" -F "package=@$(ls -1 *.deb)" -F "versions=5"'
  tags:
    - docker
