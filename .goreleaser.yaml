version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: pgdu
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: pgdu
    package_name: pgdu
    formats:
      - deb
    maintainer: Matthias Dötsch <matthias.doetsch@innogames.com>
    description: PostgreSQL table and index disk usage explorer
    section: database
    priority: optional
    license: MIT

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
